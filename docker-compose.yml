services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # DOMAIN задается в .env рядом с этим файлом;
      # по умолчанию — http://localhost для локальной разработки (без TLS)
      - DOMAIN=${DOMAIN:-http://localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # сертификаты Let's Encrypt
      - caddy_config:/config
    depends_on:
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-backend
    restart: unless-stopped
    expose:
      - "8000"   # expose to other containers, not host
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vite-frontend
    restart: unless-stopped
    expose:
      - "80"     # наружу смотрит только caddy
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
