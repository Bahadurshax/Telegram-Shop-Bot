services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-backend
    restart: unless-stopped
    expose:
      - "8000"   # expose to other containers, not host
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vite-frontend
    restart: unless-stopped
    ports:
      - "80:80"  # host:container (frontend served on localhost:80)
    depends_on:
      - backend